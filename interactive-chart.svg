<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bar {
      fill: #2ecc71;
      transition: fill 0.3s ease;
    }
    .bar:hover {
      fill: #27ae60;
      cursor: pointer;
    }
  </style>

  <rect class="bar" x="20" y="100" width="50" height="80" data-value="80" />
  <rect class="bar" x="90" y="50" width="50" height="130" data-value="130" />
  <rect class="bar" x="160" y="120" width="50" height="60" data-value="60" />
  <rect class="bar" x="230" y="80" width="50" height="100" data-value="100" />
  <rect class="bar" x="300" y="150" width="50" height="30" data-value="30" />

  <text x="20" y="195" font-size="12">Data 1</text>
  <text x="90" y="195" font-size="12">Data 2</text>
  <text x="160" y="195" font-size="12">Data 3</text>
  <text x="230" y="195" font-size="12">Data 4</text>
  <text x="300" y="195" font-size="12">Data 5</text>

</svg>