<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SVG Path Visualizer</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 1rem;
      background: #f8f8f8;
    }

    svg {
      border: 1px solid #ccc;
      background: white;
    }

    .label {
      font-size: 12px;
      fill: #333;
    }

    .dot {
      fill: red;
      stroke: black;
      stroke-width: 1;
      r: 4;
    }

    .controls {
      margin-bottom: 10px;
    }

    button {
      margin-right: 6px;
      padding: 6px 12px;
    }

    path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 3s linear forwards;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="replay()">Replay Animation</button>
    <button onclick="toggle('.dot')">Toggle Control Points</button>
    <button onclick="toggle('.label')">Toggle Labels</button>
  </div>

  <svg viewBox="0 0 600 600" width="100%" height="auto">

    <!-- MOVE and LINE -->
    <path d="M 20 40 L 120 40" stroke="black" stroke-width="2" fill="none"/>
    <text class="label" x="20" y="30">M 20 40 L 120 40 → Move & Line</text>

    <!-- HV -->
    <path d="M 20 80 H 120 V 130" stroke="blue" stroke-width="2" fill="none"/>
    <text class="label" x="20" y="70">H 120, V 130 → Horizontal & Vertical</text>

    <!-- Cubic Bézier -->
    <path d="M 20 180 C 50 120, 90 120, 120 180" stroke="red" stroke-width="2" fill="none"/>
    <circle class="dot" cx="50" cy="120"/>
    <circle class="dot" cx="90" cy="120"/>
    <text class="label" x="20" y="170">Cubic Bézier</text>

    <!-- Smooth Cubic -->
    <path d="M 20 220 C 50 160, 90 160, 120 220 S 190 280, 220 220" stroke="darkred" stroke-width="2" fill="none"/>
    <circle class="dot" cx="50" cy="160"/>
    <circle class="dot" cx="90" cy="160"/>
    <circle class="dot" cx="190" cy="280"/>
    <text class="label" x="20" y="210">Smooth Cubic</text>

    <!-- Quadratic -->
    <path d="M 20 300 Q 70 240, 120 300" stroke="green" stroke-width="2" fill="none"/>
    <circle class="dot" cx="70" cy="240"/>
    <text class="label" x="20" y="290">Quadratic Bézier</text>

    <!-- Smooth Quadratic -->
    <path d="M 20 340 Q 70 280, 120 340 T 220 340" stroke="darkgreen" stroke-width="2" fill="none"/>
    <circle class="dot" cx="70" cy="280"/>
    <text class="label" x="20" y="330">Smooth Quadratic</text>

    <!-- Arc -->
    <path d="M 20 400 A 50 50 0 0 1 120 400" stroke="purple" stroke-width="2" fill="none"/>
    <text class="label" x="20" y="390">Arc A 50 50 0 0 1 120 400</text>

    <!-- Close Path -->
    <path d="M 20 450 L 120 450 L 120 500 Z" fill="lightblue" stroke="black" stroke-width="2"/>
    <text class="label" x="20" y="440">Close Path Z</text>

  </svg>

  <script>
    function replay() {
      document.querySelectorAll("path").forEach(path => {
        path.style.animation = "none";
        void path.offsetWidth; // force reflow
        path.style.animation = "draw 3s linear forwards";
      });
    }

    function toggle(selector) {
      document.querySelectorAll(selector).forEach(el => {
        el.classList.toggle("hidden");
      });
    }
  </script>

</body>
</html>
