<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="progressGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="lightblue"/>
      <stop offset="100%" stop-color="blue"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="80" fill="none" stroke="#ccc" stroke-width="10"/>

  <path d="M100 20 A 80 80 0 1 1 180 100" stroke="url(#progressGradient)" stroke-width="10" fill="none"/>

  <text x="100" y="110" font-size="24" text-anchor="middle" fill="black">75%</text>

  <style>
    path {
      stroke-dasharray: 251;
      stroke-dashoffset: 251;
      animation: progress 2s forwards;
    }

    @keyframes progress {
      to {
        stroke-dashoffset: 62.75;
      }
    }
  </style>
</svg>
