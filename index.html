<!DOCTYPE html>
<html>
<head>
  <title>SVG Power Demo</title>
  <style>
    .container{
        width: 80%;
        margin: auto;
    }
    .container object {
      max-width: 100%;
    }
  </style>
</head>
<body>

  <h1>SVG Power Demo</h1>

  <h2>Scalable Icon</h2>
  <div class="container">
    <img src="scalable-icon.svg" alt="Scalable Icon" width="100%" height="100%">
  </div>

  <h2>Interactive Chart</h2>
  <div class="container">
    <object data="interactive-chart.svg" type="image/svg+xml" width="100%" height="200"></object>
  </div>

  <h2>Complex Path</h2>
  <div class="container">
    <object data="complex-path.svg" type="image/svg+xml" width="100%" height="200"></object>
  </div>

  <h2>Gradient Logo</h2>
  <div class="container">
    <object data="gradient-logo.svg" type="image/svg+xml" width="100%" height="200"></object>
  </div>

  <h2>Layered</h2>
  <div class="container">
    <object data="layered.svg" type="image/svg+xml" width="100%" height="200"></object>
  </div>


  <p>Resize the window to see the SVGs scale!</p>

</body>
</html>
