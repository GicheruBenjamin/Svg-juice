<svg viewBox="0 0 600 600" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- MOVE (M) and LINE (L) -->
  <path d="M 20 40 L 120 40" stroke="black" stroke-width="2" fill="none"/>
  <text x="20" y="30" font-size="12">M 20 40 L 120 40 → Move & Line</text>

  <!-- HORIZONTAL (H) and VERTICAL (V) -->
  <path d="M 20 80 H 120 V 130" stroke="blue" stroke-width="2" fill="none"/>
  <text x="20" y="70" font-size="12">H 120, V 130 → Horizontal & Vertical</text>

  <!-- CUBIC (C) -->
  <path d="M 20 180 C 50 120, 90 120, 120 180" stroke="red" stroke-width="2" fill="none"/>
  <text x="20" y="170" font-size="12">C → Cubic Bézier</text>

  <!-- SMOOTH CUBIC (S) -->
  <path d="M 20 220 C 50 160, 90 160, 120 220 S 190 280, 220 220" stroke="darkred" stroke-width="2" fill="none"/>
  <text x="20" y="210" font-size="12">S → Smooth Cubic</text>

  <!-- QUADRATIC (Q) -->
  <path d="M 20 300 Q 70 240, 120 300" stroke="green" stroke-width="2" fill="none"/>
  <text x="20" y="290" font-size="12">Q → Quadratic Bézier</text>

  <!-- SMOOTH QUADRATIC (T) -->
  <path d="M 20 340 Q 70 280, 120 340 T 220 340" stroke="darkgreen" stroke-width="2" fill="none"/>
  <text x="20" y="330" font-size="12">T → Smooth Quadratic</text>

  <!-- ARC (A) -->
  <path d="M 20 400 A 50 50 0 0 1 120 400" stroke="purple" stroke-width="2" fill="none"/>
  <text x="20" y="390" font-size="12">A → Arc with radius 50</text>

  <!-- CLOSE PATH (Z) -->
  <path d="M 20 450 L 120 450 L 120 500 Z" fill="lightblue" stroke="black" stroke-width="2"/>
  <text x="20" y="440" font-size="12">Z → Close Path</text>

</svg>
